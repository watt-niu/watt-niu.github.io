<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>微信支付确认页</title>
    <style>
      :root {
        --bg-top: #dcfce7;
        --bg-mid: #f7fee7;
        --bg-bottom: #f0fdf4;
        --card-bg: rgba(255, 255, 255, 0.92);
        --border: #d1fae5;
        --text: #0f172a;
        --muted: #64748b;
        --primary-1: #15803d;
        --primary-2: #16a34a;
        --primary-3: #22c55e;
        --warning-bg: #fffbeb;
        --warning-text: #92400e;
        --warning-border: #fde68a;
        --danger-bg: #fff1f2;
        --danger-text: #be123c;
        --danger-border: #fecdd3;
        --success-bg: #f0fdf4;
        --success-text: #166534;
        --success-border: #bbf7d0;
        --neutral-bg: #f8fafc;
        --neutral-border: #e2e8f0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        font-family:
          "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        background:
          radial-gradient(circle at top, var(--bg-top), transparent 35%),
          linear-gradient(
            180deg,
            var(--bg-mid) 0%,
            #ffffff 55%,
            var(--bg-bottom) 100%
          );
        padding: 32px 16px;
      }

      .container {
        max-width: 420px;
        margin: 0 auto;
      }

      .card {
        overflow: hidden;
        border-radius: 28px;
        border: 1px solid var(--border);
        background: var(--card-bg);
        box-shadow: 0 24px 80px rgba(22, 101, 52, 0.12);
        backdrop-filter: blur(8px);
      }

      .hero {
        padding: 32px 24px;
        color: #fff;
        background: linear-gradient(
          135deg,
          #16a34a 0%,
          #22c55e 60%,
          #86efac 100%
        );
      }

      .hero-tag {
        font-size: 12px;
        letter-spacing: 0.28em;
        opacity: 0.92;
      }

      .hero h1 {
        margin: 12px 0 0;
        font-size: 32px;
        line-height: 1.15;
      }

      .hero p {
        margin: 10px 0 0;
        font-size: 14px;
        line-height: 1.6;
        color: rgba(240, 253, 244, 0.92);
      }

      .content {
        padding: 24px;
      }

      .summary,
      .message,
      .success {
        border-radius: 24px;
        padding: 16px;
      }

      .summary {
        border: 1px solid var(--border);
        background: rgba(236, 253, 245, 0.9);
        color: #065f46;
      }

      .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        font-size: 14px;
      }

      .row + .row {
        margin-top: 14px;
      }

      .row strong {
        font-size: 26px;
        color: #064e3b;
      }

      .mono {
        max-width: 190px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
      }

      label {
        display: block;
        margin-top: 20px;
        font-size: 14px;
        font-weight: 600;
        color: #334155;
      }

      input {
        width: 100%;
        margin-top: 10px;
        border: 1px solid #cbd5e1;
        border-radius: 18px;
        background: #fff;
        padding: 14px 16px;
        font-size: 16px;
        color: var(--text);
        text-transform: uppercase;
        letter-spacing: 0.25em;
        outline: none;
        transition:
          border-color 0.2s ease,
          box-shadow 0.2s ease;
      }

      input:focus {
        border-color: #22c55e;
        box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.14);
      }

      button {
        width: 100%;
        margin-top: 20px;
        border: 0;
        border-radius: 18px;
        padding: 15px 18px;
        font-size: 16px;
        font-weight: 600;
        color: #fff;
        cursor: pointer;
        background: linear-gradient(
          135deg,
          var(--primary-1) 0%,
          var(--primary-2) 55%,
          var(--primary-3) 100%
        );
        box-shadow: 0 16px 32px rgba(21, 128, 61, 0.22);
      }

      button[disabled] {
        cursor: not-allowed;
        opacity: 0.6;
        box-shadow: none;
      }

      .message {
        margin-top: 16px;
        border: 1px solid var(--neutral-border);
        background: var(--neutral-bg);
        color: #334155;
        font-size: 14px;
        line-height: 1.6;
      }

      .message.warning {
        border-color: var(--warning-border);
        background: var(--warning-bg);
        color: var(--warning-text);
      }

      .message.error {
        border-color: var(--danger-border);
        background: var(--danger-bg);
        color: var(--danger-text);
      }

      .message.success-state {
        border-color: var(--success-border);
        background: var(--success-bg);
        color: var(--success-text);
      }

      .success {
        margin-top: 16px;
        border: 1px solid var(--success-border);
        background: linear-gradient(180deg, var(--success-bg) 0%, #ffffff 100%);
      }

      .success h2 {
        margin: 0;
        font-size: 20px;
        color: #15803d;
      }

      .success .row {
        color: #334155;
        margin-top: 12px;
      }

      .tip {
        margin-top: 16px;
        font-size: 12px;
        color: var(--muted);
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="card">
        <header class="hero">
          <div class="hero-tag">WECHAT JSAPI</div>
          <h1>确认支付</h1>
          <p>输入登录码后，在微信内调起支付并开通会员权限。</p>
        </header>

        <div class="content">
          <div class="summary">
            <div class="row">
              <span>支付金额</span>
              <strong id="amountText">¥0.00</strong>
            </div>
            <div class="row">
              <span>会员有效期</span>
              <span id="validityText">- 个月</span>
            </div>
            <div class="row">
              <span>订单号</span>
              <span class="mono" id="orderText">-</span>
            </div>
          </div>

          <label for="loginCodeInput">登录码</label>
          <input
            id="loginCodeInput"
            type="text"
            placeholder="请输入 6 位登录码"
            maxlength="6"
          />

          <button id="confirmBtn" type="button">确认支付</button>

          <div id="messageBox" class="message" style="display: none"></div>

          <section id="successBox" class="success" style="display: none">
            <h2>支付成功</h2>
            <div class="row">
              <span>实付金额</span>
              <span id="successAmount">¥0.00</span>
            </div>
            <div class="row">
              <span>会员有效期</span>
              <span id="successValidity">- 个月</span>
            </div>
            <div class="row">
              <span>到期时间</span>
              <span id="successDate">-</span>
            </div>
          </section>
        </div>
      </section>
    </main>

    <script>
      const API_BASE_URL = "https://cs.qdniu.cn";

      const state = {
        loginCode: "",
        paymentInfo: null,
        paymentOrder: null,
        paymentSettings: null,
        openid: "",
        status: "idle",
        isBusy: false,
        pollTimer: null,
        autoTriggered: false,
      };

      const elements = {
        loginCodeInput: document.getElementById("loginCodeInput"),
        confirmBtn: document.getElementById("confirmBtn"),
        messageBox: document.getElementById("messageBox"),
        successBox: document.getElementById("successBox"),
        amountText: document.getElementById("amountText"),
        validityText: document.getElementById("validityText"),
        orderText: document.getElementById("orderText"),
        successAmount: document.getElementById("successAmount"),
        successValidity: document.getElementById("successValidity"),
        successDate: document.getElementById("successDate"),
      };

      function getSearchParams() {
        return new URLSearchParams(window.location.search);
      }

      function isWechatBrowser() {
        return /MicroMessenger/i.test(window.navigator.userAgent || "");
      }

      function formatAmount(amountYuan) {
        return Number(amountYuan || 0).toFixed(2);
      }

      function formatDateTime(value) {
        if (!value) return "-";
        return new Intl.DateTimeFormat("zh-CN", {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
        }).format(new Date(value));
      }

      function getPaymentSummary() {
        const settings =
          state.paymentInfo?.settings || state.paymentSettings || {};
        const activeOrder = state.paymentInfo?.activeOrder;

        return {
          amountYuan:
            state.paymentOrder?.amountYuan ?? settings.amountYuan ?? 0,
          validityMonths: settings.validityMonths ?? 0,
          validUntil:
            activeOrder?.validUntil || state.paymentOrder?.validUntil || "",
        };
      }

      function render() {
        const summary = getPaymentSummary();
        elements.loginCodeInput.value = state.loginCode;
        elements.confirmBtn.disabled = state.isBusy;
        elements.confirmBtn.textContent = state.isBusy
          ? "处理中..."
          : "确认支付";
        elements.amountText.textContent =
          "¥" + formatAmount(summary.amountYuan);
        elements.validityText.textContent =
          (summary.validityMonths || "-") + " 个月";
        elements.orderText.textContent = state.paymentOrder?.outTradeNo || "-";
        elements.successAmount.textContent =
          "¥" + formatAmount(summary.amountYuan);
        elements.successValidity.textContent =
          (summary.validityMonths || "-") + " 个月";
        elements.successDate.textContent = formatDateTime(summary.validUntil);
        elements.successBox.style.display =
          state.status === "success" ? "block" : "none";
      }

      function setMessage(text, type) {
        if (!text) {
          elements.messageBox.style.display = "none";
          elements.messageBox.textContent = "";
          elements.messageBox.className = "message";
          return;
        }

        elements.messageBox.style.display = "block";
        elements.messageBox.textContent = text;
        elements.messageBox.className = "message" + (type ? " " + type : "");
      }

      function clearPollTimer() {
        if (state.pollTimer) {
          window.clearInterval(state.pollTimer);
          state.pollTimer = null;
        }
      }

      function syncPaymentState(payment, order) {
        state.paymentInfo = payment || null;
        state.paymentOrder =
          order || payment?.latestOrder || payment?.activeOrder || null;
        render();
      }

      async function requestJson(url, options) {
        const response = await fetch(url, options);
        const result = await response.json();
        if (!response.ok || !result.success) {
          throw new Error(result.error || "请求失败");
        }
        return result;
      }

      async function loadPaymentSettings() {
        try {
          const result = await requestJson(
            API_BASE_URL + "/api/client/payment/settings",
            {
              method: "GET",
              headers: {
                "Content-Type": "application/json",
              },
            },
          );
          state.paymentSettings = result.settings;
          render();
        } catch (error) {
          setMessage(error.message || "获取支付配置失败", "error");
        }
      }

      async function checkPaymentStatus(currentLoginCode, outTradeNo) {
        const result = await requestJson(
          API_BASE_URL + "/api/client/payment/status",
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              loginCode: currentLoginCode,
              outTradeNo: outTradeNo,
            }),
          },
        );

        syncPaymentState(result.payment, result.order);
        if (result.payment?.hasAccess) {
          state.status = "success";
          clearPollTimer();
          setMessage("支付成功，会员已开通", "success-state");
          render();
        }

        return result;
      }

      function invokeWechatPay(jsapi) {
        return new Promise((resolve, reject) => {
          const onBridgeReady = () => {
            window.WeixinJSBridge.invoke(
              "getBrandWCPayRequest",
              {
                appId: jsapi.appId,
                timeStamp: jsapi.timeStamp,
                nonceStr: jsapi.nonceStr,
                package: jsapi.package,
                signType: jsapi.signType,
                paySign: jsapi.paySign,
              },
              (res) => {
                const errMsg = res?.err_msg || "";
                if (errMsg === "get_brand_wcpay_request:ok") {
                  resolve(res);
                  return;
                }

                if (errMsg === "get_brand_wcpay_request:cancel") {
                  reject(new Error("你已取消支付"));
                  return;
                }

                reject(
                  new Error(res?.err_desc || errMsg || "微信支付调用失败"),
                );
              },
            );
          };

          if (window.WeixinJSBridge) {
            onBridgeReady();
            return;
          }

          document.addEventListener("WeixinJSBridgeReady", onBridgeReady, {
            once: true,
          });
        });
      }

      function buildAuthorizeUrl(loginCode) {
        const returnUrl = window.location.origin + window.location.pathname;
        const url = new URL(
          API_BASE_URL + "/api/client/payment/jsapi/authorize",
        );
        url.searchParams.set("loginCode", loginCode);
        url.searchParams.set("returnUrl", returnUrl);
        return url.toString();
      }

      function updateUrlWithoutTransientParams() {
        const url = new URL(window.location.href);
        url.searchParams.set("loginCode", state.loginCode);
        url.searchParams.delete("code");
        url.searchParams.delete("state");
        url.searchParams.delete("error");
        window.history.replaceState({}, "", url.toString());
      }

      function ensurePolling() {
        clearPollTimer();
        if (
          !state.loginCode ||
          !state.paymentOrder?.outTradeNo ||
          state.status === "success"
        ) {
          return;
        }

        state.pollTimer = window.setInterval(() => {
          checkPaymentStatus(
            state.loginCode,
            state.paymentOrder.outTradeNo,
          ).catch(() => {});
        }, 3000);
      }

      async function handleConfirmPay(options = {}) {
        const silent = Boolean(options.silent);
        state.loginCode = state.loginCode.trim().toUpperCase();
        render();

        if (!state.loginCode) {
          setMessage("请输入登录码", "error");
          return;
        }

        if (!isWechatBrowser()) {
          setMessage("请在微信内打开当前页面后再发起 JSAPI 支付", "warning");
          return;
        }

        const params = getSearchParams();
        const authCode = params.get("code") || "";

        if (!authCode && !state.openid) {
          state.status = "authorizing";
          setMessage("正在获取微信支付授权...", "");
          window.location.href = buildAuthorizeUrl(state.loginCode);
          return;
        }

        state.isBusy = true;
        state.status = "creating";
        if (!silent) {
          setMessage("", "");
        }
        render();

        try {
          const result = await requestJson(
            API_BASE_URL + "/api/client/payment/jsapi/order",
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                loginCode: state.loginCode,
                code: authCode || undefined,
                openid: state.openid || undefined,
              }),
            },
          );

          syncPaymentState(result.payment, result.order);
          if (result.jsapi?.openid) {
            state.openid = result.jsapi.openid;
          }

          if (!result.requiresPayment && result.payment?.hasAccess) {
            state.status = "success";
            clearPollTimer();
            setMessage("当前账号已开通会员，无需重复支付", "success-state");
            updateUrlWithoutTransientParams();
            render();
            return;
          }

          state.status = "paying";
          render();
          await invokeWechatPay(result.jsapi);
          setMessage("支付请求已提交，正在确认结果...", "");
          await checkPaymentStatus(state.loginCode, result.order?.outTradeNo);
          updateUrlWithoutTransientParams();
          ensurePolling();
        } catch (error) {
          state.status = "error";
          setMessage(error.message || "支付发起失败，请重试", "error");
        } finally {
          state.isBusy = false;
          render();
        }
      }

      function initFromQuery() {
        const params = getSearchParams();
        state.loginCode = (params.get("loginCode") || "").trim().toUpperCase();
        state.openid = "";

        const authError = params.get("error");
        if (authError) {
          state.status = "error";
          setMessage(decodeURIComponent(authError), "error");
        }

        render();

        if (params.get("code") && state.loginCode && !state.autoTriggered) {
          state.autoTriggered = true;
          handleConfirmPay({ silent: true });
        }
      }

      elements.loginCodeInput.addEventListener("input", (event) => {
        state.loginCode = event.target.value.replace(/\s+/g, "").toUpperCase();
        render();
      });

      elements.confirmBtn.addEventListener("click", () => {
        handleConfirmPay();
      });

      loadPaymentSettings();
      initFromQuery();
    </script>
  </body>
</html>
